name: unreal-ci-stub

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on:
      - self-hosted
      - windows
      - unreal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap
        shell: powershell
        run: .\scripts\bootstrap.ps1

      - name: Build
        shell: powershell
        run: .\scripts\build.ps1

      - name: Test
        shell: powershell
        run: .\scripts\test.ps1

      - name: Package
        shell: powershell
        run: .\scripts\package.ps1
